name: Deploy to ng-mfe-pokemon repository within this same org

on:
  push:
    branches:
      - main
      - develop
      - feat/*
      - copilot/*

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20.11.1'  # Adjust the Node.js version as needed


    - name: Build Angular app
      run: |
            rm -rf node_modules package-lock.json
            npm i
            #npm run build -- --output-path=dist/angular-poc-shell/browser
            npm run build -- --configuration production --base-href "/all-mfe-builds/pokemon/"
            #npm run build

    - name: Debug dist
      run: ls -R dist


    # - name: Deploy to OpensourceKD/pokemon
    #   uses: peaceiris/actions-gh-pages@v3
