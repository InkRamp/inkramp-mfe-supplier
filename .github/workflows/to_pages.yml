    #     personal_token: ${{ secrets.PAT_TOKEN }}
    #     external_repository: OpensourceKD/pokemon
    #     publish_branch: main
    #     publish_dir: ./dist/pokemon
    
    - name: Deploy Pokémon MFE to all-mfe-builds repo
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: main
        folder: ./dist/pokemon
        repository-name: OpensourceKD/all-mfe-builds
        token: ${{ secrets.PAT_TOKEN }}
        target-folder: pokemon        # 👈 deploys into /pokemon/ subfolder
        clean: false                  # 👈 preserves other MFEs
        clean-exclude: .nojekyll      # 👈 prevents deletion if already there
        #single-commit: true           # 👈 keeps just one commit, overwriting previous

